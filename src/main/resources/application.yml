server:
  port: 8888
  servlet:
    encoding:
      charset: UTF-8
      enabled: true

spring:
  application:
    name: multimodal-demo
  config:
    import: optional:file:./application-local.yml
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  web:
    resources:
      static-locations: classpath:/static/
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:123456}
      # 有密码时在 application-local.yml 配置 spring.data.redis.password，或 export REDIS_PASSWORD
      timeout: ${REDIS_TIMEOUT:3s}

# CORS：逗号分隔的 allowedOriginPatterns。Docker/ECS 经 Nginx 访问时 Origin 为 http://<IP>:8888，须含 * 或具体域名
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:*,http://127.0.0.1:*,*}

agentscope:
  session:
    # redis（默认，生产/多实例）| file（本地无 Redis）
    store: ${AGENTSCOPE_SESSION_STORE:redis}
    key-prefix: ${AGENTSCOPE_SESSION_KEY_PREFIX:agentscope:multimodal-demo:}
    file-root: ${AGENTSCOPE_SESSION_ROOT:data/agentscope-sessions}

# DashScope（通义 / 百炼）API Key，必填。生产环境务必用环境变量注入，勿写明文入库：
#   export DASHSCOPE_API_KEY=sk-...
# 本地开发可复制为 application-local.yml（已加入 .gitignore）并只在本机填写 dashscope.api-key。
dashscope:
  api-key: ${DASHSCOPE_API_KEY:sk-76aec4a6346242f997e85dbc75062b28}
  # qwen-vl-max 勿开启，否则会 400（thinking_budget）；更换支持思考的视觉模型后再设 true
  vision-enable-thinking: true
  vision-thinking-budget: ${DASHSCOPE_VISION_THINKING_BUDGET:1000}

logging:
  level:
    root: INFO
    io.agentscope.demo.app: DEBUG
